server {
    listen $PORT;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Prevent nginx from redirecting to internal port
    absolute_redirect off;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|mp4|woff2|woff|ttf|css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Serve pages: try exact file, then folder/index.html
    location / {
        try_files $uri $uri/index.html $uri/ =404;
    }

    # Custom 404
    error_page 404 /404.html;
}
